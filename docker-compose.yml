services:
  backend:
    build: ./backend
    env_file: .env
    volumes:
      - lecture-data:/app/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  lecture-data:
